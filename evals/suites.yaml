# Stage 1 suites — run on every change, all must pass
quick:
  description: 'Fast smoke test — one case per tool category'
  stage: golden_sets
  fixture: moderate-portfolio
  cases: [acct-001, mkt-001, fx-001, sym-001, prof-001, bench-001, hist-001, hold-001, hold-002, div-001, inv-001, act-001, bal-001, spark-001, bar-001]

