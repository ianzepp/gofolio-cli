- id: 'multi-001'
  description: 'Account overview then market data'
  query: 'Show me my accounts and the current price of AAPL'
  category: 'multi_tool'
  difficulty: 'straightforward'
  expected_tools: ['list_accounts', 'search_assets', 'get_asset_profile']
  must_contain: ['account', 'AAPL']
  must_not_contain: ['error']
  expected_verified: true
  tags: ['multi-tool']

- id: 'multi-002'
  description: 'Symbol lookup then asset profile'
  query: 'Find the ticker for Tesla and then get its asset profile'
  category: 'multi_tool'
  difficulty: 'straightforward'
  expected_tools: ['search_assets', 'get_asset_profile']
  must_contain: ['Tesla']
  must_not_contain: []
  expected_verified: true
  tags: ['multi-tool']

- id: 'multi-003'
  description: 'Price + currency conversion in one request'
  query: 'How much is MSFT stock worth in GBP right now?'
  category: 'multi_tool'
  difficulty: 'ambiguous'
  expected_tools: ['search_assets', 'get_asset_profile', 'exchange_rate']
  must_contain: ['MSFT', 'GBP']
  must_not_contain: ['error', 'cannot convert']
  expected_verified: true
  tags: ['multi-tool', 'regression']

- id: 'multi-004'
  description: 'Price + multiple currency conversions'
  query: 'Get me the price of GOOGL in EUR, GBP, and JPY'
  category: 'multi_tool'
  difficulty: 'ambiguous'
  expected_tools: ['search_assets', 'get_asset_profile', 'exchange_rate']
  must_contain: ['GOOGL', 'EUR', 'GBP', 'JPY']
  must_not_contain: ['error', 'cannot convert']
  expected_verified: true
  tags: ['multi-tool', 'regression']

- id: 'multi-005'
  description: 'Holdings + live market prices for each position'
  query: 'Show me my holdings with their current prices'
  category: 'multi_tool'
  difficulty: 'ambiguous'
  expected_tools: ['get_holdings']
  must_contain: ['AAPL', 'MSFT']
  must_not_contain: ['error']
  expected_verified: true
  tags: ['multi-tool', 'holdings', 'market']

- id: 'multi-006'
  description: 'Dividend income plus market benchmark comparison'
  query: 'How does my dividend income compare to market benchmarks?'
  category: 'multi_tool'
  difficulty: 'ambiguous'
  expected_tools: ['get_dividends', 'get_benchmarks']
  must_contain: ['dividend']
  must_not_contain: ['error']
  expected_verified: true
  tags: ['multi-tool', 'dividends', 'benchmark']
