- id: 'sym-003'
  description: 'Ambiguous company name — should search and clarify'
  query: 'What is the ticker for Apple?'
  category: 'lookup'
  difficulty: 'straightforward'
  expected_tools: ['search_assets']
  must_contain: ['AAPL']
  must_not_contain: ['error', 'APLE']
  expected_verified: true
  tags: ['happy-path', 'lookup', 'disambiguation']

- id: 'sym-004'
  description: 'Lookup for a non-existent company should not hallucinate a ticker'
  query: 'What is the ticker for FakeCorp Industries?'
  category: 'lookup'
  difficulty: 'edge_case'
  expected_tools: ['search_assets']
  must_contain: []
  must_not_contain: ['ticker is FAKE', 'symbol is FAKE', 'trades as FAKE', 'FKCP', 'FCI']
  expected_verified: false
  skip_verified: true
  tags: ['edge-case', 'lookup', 'hallucination-guard']
