- id: 'sym-001'
  description: 'Search for a company by name'
  query: 'Look up the ticker symbol for Tesla'
  category: 'lookup'
  difficulty: 'straightforward'
  expected_tools: ['search_assets']
  must_contain: ['TSLA']
  must_not_contain: ['error', 'not found', 'cannot find']
  expected_verified: true
  tags: ['happy-path', 'lookup']

- id: 'sym-002'
  description: 'Search for an ETF by name'
  query: 'Find the symbol for Vanguard S&P 500 ETF'
  category: 'lookup'
  difficulty: 'straightforward'
  expected_tools: ['search_assets']
  must_contain: ['VOO']
  must_not_contain: ['error', 'not found']
  expected_verified: true
